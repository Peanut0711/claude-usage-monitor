; ============================================================================
;  Claude Usage Monitor  -  LilyGo T-Display S3 Pro
;  Board: K231 / XY231020  (ESP32-S3R8, 16MB Flash, 8MB OPI PSRAM)
;  Display: 2.33" IPS 222x480, ST7796 over SPI
;
;  All MCU / flash / PSRAM settings below are taken from the official board
;  definition, NOT guessed:
;    https://github.com/Xinyuan-LilyGO/T-Display-S3-Pro/blob/master/board/t-display-s3-pro.json
; ============================================================================

[env:tdisplay-s3-pro]
platform  = espressif32@6.5.0
framework = arduino
board     = esp32-s3-devkitc-1

; --- MCU / memory ---------------------------------------------------------
; ESP32-S3R8 = QIO flash + OPI (octal) PSRAM  -> memory_type = qio_opi
board_build.mcu             = esp32s3
board_build.flash_mode      = qio
board_build.arduino.memory_type = qio_opi
board_build.f_flash         = 80000000L
board_build.f_cpu           = 240000000L
board_upload.flash_size     = 16MB
board_upload.maximum_size   = 16777216
board_build.partitions      = default_16MB.csv

; --- Serial / upload ------------------------------------------------------
monitor_speed   = 115200
upload_speed    = 921600
monitor_filters = esp32_exception_decoder, time

; --- Build flags ----------------------------------------------------------
; Mirrors the extra_flags from the official board JSON.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
    -DBOARD_HAS_PSRAM
    -DLGFX_USE_V1
    -DCORE_DEBUG_LEVEL=3

; --- Libraries (versions pinned) ------------------------------------------
lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    lewisxhe/SensorLib@^0.2.4
    lewisxhe/XPowersLib@^0.2.6
